name: CI & Release

on:
  push:
    branches: [main]
    # 纯文档改动不触发整条流水线：**.md / docs/** 不进 //go:embed 的 frontend/dist
    # （embed 只吃 dist，见 internal/api/server.go），不影响二进制；且 .releaserc 里
    # docs/test/ci/style 本就 release:false，跑满 CI+docker+release 评估纯白烧 ~4min。
    # 仅当本次 push 的全部改动文件都匹配时才跳过——混合改动（含任一非文档文件）照常跑。
    # 副作用：纯文档的 chore/refactor/perf 等（release:true 类型）只动 .md 时也被跳过→不发版；
    # 文档无产物变化本不该 bump 镜像版本，需要时同 push 带一个代码文件即可。
    # 只加在 push（直推 main 的实际流程）；不加 pull_request，避免必需检查 pending 卡合并。
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # 不取消正在运行的 workflow，避免"已发版但未推镜像"的不一致状态
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ==================== CI ====================
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # commitlint + semantic-release 需要完整历史

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          # 跟随最新 1.26.x（与生产 Dockerfile golang:1.26-alpine 一致），
          # 确保 govulncheck 跑在含安全补丁的工具链上。
          go-version: '1.26'
          # check-latest 必开：否则 setup-go 优先用 runner 预装/缓存的 Go（常滞后一个
          # 补丁，如 1.25.10），而新 stdlib CVE（GO-2026-5037/5039，fixed in 1.25.11）
          # 一发布 govulncheck 立即判红、阻断所有 release——这是 toolchain-lag race，
          # 与代码无关。check-latest=true 强制从 go.dev manifest 取最新匹配补丁，根治。
          check-latest: true
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # Commitlint：检查本次 push 的所有新提交
      - name: Lint commit messages
        if: github.event_name == 'push'
        run: |
          npm install --no-save @commitlint/cli@latest @commitlint/config-conventional@latest
          # 处理首推/强推场景：before 为全0或不可达时，从最近 tag 开始检查
          BEFORE="${{ github.event.before }}"
          if [[ "$BEFORE" == "0000000000000000000000000000000000000000" ]] || ! git rev-parse --verify "$BEFORE^{commit}" >/dev/null 2>&1; then
            # 获取最近的 tag，如果没有 tag 则检查所有提交
            BEFORE=$(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)
          fi
          npx commitlint --from "$BEFORE" --to ${{ github.sha }} --verbose

      # 前端构建
      - name: Build frontend
        working-directory: frontend
        env:
          VITE_NOTIFIER_API_URL: https://notifier.relaypulse.top
        run: |
          npm ci
          npm run build
          echo "Frontend build completed"
          ls -la dist/

      - name: Copy frontend dist to internal/api
        run: |
          mkdir -p internal/api/frontend
          cp -r frontend/dist internal/api/frontend/
          echo "Verifying embed directory..."
          ls -la internal/api/frontend/dist/
          test -f internal/api/frontend/dist/index.html || (echo "ERROR: index.html not found!" && exit 1)

      # Go 检查
      - name: Go format check
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Go files are not formatted:"
            gofmt -l .
            exit 1
          fi

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test ./... -v -coverprofile=coverage.out

      - name: Go coverage report
        run: go tool cover -func=coverage.out

      # 前端 lint
      - name: Frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Frontend test
        working-directory: frontend
        run: npm run test -- --run

      # 依赖/标准库漏洞闸：跑在 1.25.x（生产等价）工具链上，防安全回归。
      # 不放进本地 Makefile——开发机若用更新的 Go 小版本会误报与生产无关的告警。
      - name: Vulnerability scan (govulncheck)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Test Summary
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Go Coverage" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          go tool cover -func=coverage.out | tail -10 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ==================== Release (等待 ci 和 docker 都完成) ====================
  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [ci, docker]  # ci 和 docker 并行，都完成后才 release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # 保持默认 persist-credentials: true，semantic-release 需要推 tag

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v6
        with:
          extra_plugins: |
            @semantic-release/commit-analyzer
            @semantic-release/release-notes-generator
            @semantic-release/github
            conventional-changelog-conventionalcommits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release Summary
        run: |
          echo "## Release" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.semantic.outputs.new_release_published }}" == "true" ]]; then
            echo "🎉 **New release published:** v${{ steps.semantic.outputs.new_release_version }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ No new release (commit type does not trigger release)" >> $GITHUB_STEP_SUMMARY
          fi

  # ==================== Docker (CI 通过后构建) ====================
  docker:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [ci]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build version info
        id: info
        run: |
          GIT_COMMIT=$(git rev-parse --short HEAD)
          BUILD_TIME=$(git show -s --format=%cI HEAD)
          VERSION="$(git describe --tags --always 2>/dev/null || echo "dev-${GIT_COMMIT}")"

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "git_commit=${GIT_COMMIT}" >> $GITHUB_OUTPUT
          echo "build_time=${BUILD_TIME}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image (:latest)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          provenance: false
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          build-args: |
            VERSION=${{ steps.info.outputs.version }}
            GIT_COMMIT=${{ steps.info.outputs.git_commit }}
            BUILD_TIME=${{ steps.info.outputs.build_time }}
            VITE_HIDE_PRICE_COLUMN=${{ vars.HIDE_PRICE_COLUMN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker Summary
        run: |
          echo "## Docker Image Built 🐳" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: \`:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.info.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ steps.info.outputs.git_commit }}" >> $GITHUB_STEP_SUMMARY

  # ==================== Tag Version (release 完成后给镜像打版本 tag) ====================
  tag-version:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.release.outputs.new_release_published == 'true'
    needs: release  # release 已包含对 ci 和 docker 的依赖
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag image with version
        run: |
          docker buildx imagetools create \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ needs.release.outputs.new_release_version }} \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Version Tag Summary
        run: |
          echo "## Version Tag Added 🏷️" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: v${{ needs.release.outputs.new_release_version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pull Commands" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ needs.release.outputs.new_release_version }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
